# FOSSA CLI configuration for ShopMatch Pro.
# This file controls project metadata and scan target/path filtering.
# License policy decisions and issue auto-ignore rules are managed in the
# FOSSA dashboard, not in .fossa.yml.
# Reference: https://github.com/fossas/fossa-cli/blob/master/docs/references/files/fossa-yml.md

version: 3

project:
  name: shopmatch-pro
  link: https://github.com/RazonIn4K/shopmatch-pro
  url: https://github.com/RazonIn4K/shopmatch-pro

telemetry:
  scope: "off"

targets:
  only:
    - type: npm
      path: .

paths:
  exclude:
    - .next
    - .vercel
    - node_modules
    - playwright-report
    - test-results
